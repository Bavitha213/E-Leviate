<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Your Interest</title>
  <link rel="icon" type="image/png" href="feviconn.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f6fa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 30px 20px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.06);
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #061c3f;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-style: italic;
      color: #555;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }

    .phone-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .phone-group select {
      flex: 0 0 90px;
    }

    .phone-group input {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #333;
    }

    .note {
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      margin-top: 20px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
  .phone-group {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .phone-group select {
    flex: 0 0 90px; /* Keep it compact */
    width: auto;
  }

  .phone-group input {
    flex: 1;
    width: auto;
  }
}

  </style>
</head>
<body>

  <div class="container">
    <h1>Register Your Interest</h1>
    <p class="subtitle">Please fill out the form below and we will get back to you shortly</p>

    <form id="registerForm">
      <input type="text" name="First Name" placeholder="First Name" required />
      <input type="email" name="Email" placeholder="Email" required />

      <div class="phone-group">
        <select name="Country Code">
          <option value="+64">+64</option>
          <option value="+91">+91</option>
          <option value="+1">+1</option>
          <option value="+61">+61</option>
        </select>
        <input type="tel" name="Phone Number" placeholder="Contact Number" required />
      </div>

      <textarea name="Message" rows="4" placeholder="Message"></textarea>

      <button type="submit">Submit</button>
    </form>

    <p class="note">
      By submitting, you agree to receive updates and communication from our team. View our privacy policy and terms for more information.
    </p>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault(); // Prevent actual submission
      window.location.href = "thankyou.html"; // Redirect to thank you page
    });
  </script>

</body>
</html>
